<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta</title>
  <link rel="stylesheet" href="estilos/estilos.css">
</head>
<body>
  <h1>Regístrate ahora</h1>
  <form name="datos">
    <legend>Crear cuenta</legend>
    <label for="nombre">Nombre: </label>
    <input type="text" name="nombre" id="nombre"><br>
    <label for="apellido1">Primer apellido: </label>
    <input type="text" name="apellido1" id="apellido1"><br>
    <label for="apellido2">Segundo apellido: </label>
    <input type="text" name="apellido2" id="apellido2"><br>
    <label for="nacimiento">Fecha de Nacimiento: </label>
    <input type="date" name="nacimiento" id="nacimiento"><br>
    <label for="email">Correo electrónico: </label>
    <input type="email" name="email" id="email"><br>
    <label for="passw">Contraseña</label>
    <input type="password" name="passw" id="passw"><br>
    <label for="confirmpassw">Confirmar contraseña</label>
    <input type="password" name="confirmpassw" id="confirmpassw"><br><br>
    <button type="submit">Enviar</button>
  </form>
</body>
</html>
